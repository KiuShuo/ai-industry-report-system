<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 行业动态报告系统</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #f7f8fa; color: #222; }
    .card { max-width: 860px; margin: 0 auto; background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 4px 18px rgba(0,0,0,.08); }
    h1 { margin-top: 0; }
    input, select, button, textarea { width: 100%; padding: 12px; margin-top: 10px; margin-bottom: 16px; box-sizing: border-box; }
    button { cursor: pointer; }
    pre { white-space: pre-wrap; background: #f3f4f6; padding: 16px; border-radius: 8px; }
    .status-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin: 18px 0 10px; }
    .status-card { background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px; }
    .label { font-size: 12px; color: #6b7280; margin-bottom: 6px; }
    .value { font-size: 18px; font-weight: 600; }
    .hint { color: #4b5563; margin-top: -6px; margin-bottom: 18px; }
    .report-link { display: inline-block; margin-top: 10px; color: #0f766e; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <h1>AI 行业动态查询与报告生成</h1>
    <label>行业主题</label>
    <input id="topic" value="航运融资租赁" />
    <label>时间范围</label>
    <select id="timeRange">
      <option value="7d">最近 7 天</option>
      <option value="30d">最近 30 天</option>
      <option value="90d">最近 90 天</option>
    </select>
    <button onclick="generateReport()">生成报告</button>
    <p class="hint" id="runtimeHint">正在检查当前运行模式...</p>
    <div class="status-grid">
      <div class="status-card">
        <div class="label">任务状态</div>
        <div class="value" id="taskStatus">-</div>
      </div>
      <div class="status-card">
        <div class="label">偏好模式</div>
        <div class="value" id="preferredMode">-</div>
      </div>
      <div class="status-card">
        <div class="label">实际执行模式</div>
        <div class="value" id="actualMode">-</div>
      </div>
      <div class="status-card">
        <div class="label">Fallback 原因</div>
        <div class="value" id="fallbackReason">-</div>
      </div>
    </div>
    <a id="reportLink" class="report-link" href="#" target="_blank" style="display:none;">打开报告详情</a>
    <h2>结果</h2>
    <pre id="result">等待生成...</pre>
  </div>
  <script>
    let pollTimer = null;

    function getApiBase() {
      if (window.location.port === '8000') {
        return '';
      }
      return window.location.protocol + '//' + window.location.hostname + ':8000';
    }

    function setTaskState(task) {
      document.getElementById('taskStatus').textContent = task.status || '-';
      document.getElementById('preferredMode').textContent = task.preferredMode || task.mode || '-';
      document.getElementById('actualMode').textContent = task.mode || '-';
      document.getElementById('fallbackReason').textContent = task.fallbackReason || '-';
      if (task.reportId) {
        const link = document.getElementById('reportLink');
        link.href = 'report.html?taskId=' + encodeURIComponent(task.taskId);
        link.style.display = 'inline-block';
      }
    }

    async function loadRuntimeStatus() {
      try {
        const res = await fetch(getApiBase() + '/api/runtime/status');
        const data = await res.json();
        document.getElementById('runtimeHint').textContent =
          '当前偏好模式：' + (data.preferredMode || '-') +
          '；实际可用模式：' + (data.effectiveMode || '-') +
          (data.fallbackActive ? '；DeerFlow 不可达，已处于本地 fallback。' : '');
      } catch (e) {
        document.getElementById('runtimeHint').textContent = '运行模式检查失败：' + e;
      }
    }

    async function pollTask(taskId) {
      const result = document.getElementById('result');
      try {
        const res = await fetch(getApiBase() + '/api/task/status/' + taskId);
        const data = await res.json();
        setTaskState(data);
        result.textContent = JSON.stringify(data, null, 2);
        if (data.status === 'finished' || data.status === 'failed') {
          if (pollTimer) {
            clearInterval(pollTimer);
            pollTimer = null;
          }
        }
      } catch (e) {
        result.textContent = '轮询失败: ' + e;
      }
    }

    async function generateReport() {
      const topic = document.getElementById('topic').value;
      const timeRange = document.getElementById('timeRange').value;
      const result = document.getElementById('result');
      const link = document.getElementById('reportLink');
      link.style.display = 'none';
      if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
      result.textContent = '正在生成...';
      try {
        const res = await fetch(getApiBase() + '/api/task/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic, timeRange })
        });
        const data = await res.json();
        setTaskState(data);
        result.textContent = JSON.stringify(data, null, 2);
        await pollTask(data.taskId);
        pollTimer = setInterval(() => pollTask(data.taskId), 1500);
      } catch (e) {
        result.textContent = '请求失败: ' + e;
      }
    }

    loadRuntimeStatus();
  </script>
</body>
</html>
