<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 行业动态报告系统</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #f7f8fa; color: #222; }
    .card { max-width: 860px; margin: 0 auto; background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 4px 18px rgba(0,0,0,.08); }
    h1 { margin-top: 0; }
    input, select, button, textarea { width: 100%; padding: 12px; margin-top: 10px; margin-bottom: 16px; box-sizing: border-box; }
    button { cursor: pointer; }
    pre { white-space: pre-wrap; background: #f3f4f6; padding: 16px; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>AI 行业动态查询与报告生成</h1>
    <label>行业主题</label>
    <input id="topic" value="航运融资租赁" />
    <label>时间范围</label>
    <select id="timeRange">
      <option value="7d">最近 7 天</option>
      <option value="30d">最近 30 天</option>
      <option value="90d">最近 90 天</option>
    </select>
    <button onclick="generateReport()">生成报告</button>
    <h2>结果</h2>
    <pre id="result">等待生成...</pre>
  </div>
  <script>
    async function generateReport() {
      const topic = document.getElementById('topic').value;
      const timeRange = document.getElementById('timeRange').value;
      const result = document.getElementById('result');
      result.textContent = '正在生成...';
      try {
        const res = await fetch('/api/task/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic, timeRange })
        });
        const data = await res.json();
        result.textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        result.textContent = '请求失败: ' + e;
      }
    }
  </script>
</body>
</html>
