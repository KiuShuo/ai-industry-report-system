<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>运行模式状态</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #f6f7fb; color: #222; }
    .wrap { max-width: 960px; margin: 0 auto; background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 4px 18px rgba(0,0,0,.08); }
    button { padding: 12px 16px; cursor: pointer; }
    pre { white-space: pre-wrap; background: #f3f4f6; padding: 16px; border-radius: 8px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin: 20px 0; }
    .item { background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px; }
    .label { font-size: 12px; color: #6b7280; margin-bottom: 6px; }
    .value { font-size: 18px; font-weight: 600; }
    .links { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 18px; }
    .links a { color: #0f766e; text-decoration: none; font-weight: 600; }
    .hint { color: #4b5563; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>系统运行模式状态</h1>
    <div class="links">
      <a href="index.html">返回任务首页</a>
      <a href="report.html">查看报告页</a>
    </div>
    <p class="hint">用于查看当前系统是优先走 DeerFlow 还是本地链路，并展示运行探测细节。</p>
    <button onclick="checkHealth()">检查状态</button>
    <div class="grid">
      <div class="item">
        <div class="label">偏好模式</div>
        <div class="value" id="preferredMode">-</div>
      </div>
      <div class="item">
        <div class="label">实际可用模式</div>
        <div class="value" id="effectiveMode">-</div>
      </div>
      <div class="item">
        <div class="label">DeerFlow 可达</div>
        <div class="value" id="runtimeReachable">-</div>
      </div>
      <div class="item">
        <div class="label">Fallback 状态</div>
        <div class="value" id="fallbackActive">-</div>
      </div>
      <div class="item">
        <div class="label">探测状态码</div>
        <div class="value" id="statusCode">-</div>
      </div>
      <div class="item">
        <div class="label">探测端点</div>
        <div class="value" id="probeEndpoint">-</div>
      </div>
    </div>
    <h2>运行说明</h2>
    <pre id="message">等待检查...</pre>
    <h2>探测尝试</h2>
    <pre id="attempts">等待检查...</pre>
    <h2>返回结果</h2>
    <pre id="content">等待检查...</pre>
  </div>
  <script>
    function getApiBase() {
      if (window.location.port === '8000') {
        return '';
      }
      return window.location.protocol + '//' + window.location.hostname + ':8000';
    }

    function setValue(id, value) {
      document.getElementById(id).textContent = value === undefined || value === null || value === '' ? '-' : String(value);
    }

    async function checkHealth() {
      const content = document.getElementById('content');
      const message = document.getElementById('message');
      const attempts = document.getElementById('attempts');
      content.textContent = '检查中...';
      message.textContent = '检查中...';
      attempts.textContent = '检查中...';
      try {
        const res = await fetch(getApiBase() + '/api/runtime/status');
        const data = await res.json();
        setValue('preferredMode', data.preferredMode || '-');
        setValue('effectiveMode', data.effectiveMode || '-');
        setValue('runtimeReachable', Boolean(data.runtimeReachable));
        setValue('fallbackActive', data.fallbackActive ? '已启用' : '未启用');
        setValue('statusCode', data.statusCode);
        setValue('probeEndpoint', data.probeEndpoint);
        message.textContent = data.message || '无额外说明';
        attempts.textContent = data.attempts && data.attempts.length
          ? JSON.stringify(data.attempts, null, 2)
          : '本次探测未记录额外失败尝试。';
        content.textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        setValue('preferredMode', '-');
        setValue('effectiveMode', '-');
        setValue('runtimeReachable', '-');
        setValue('fallbackActive', '-');
        setValue('statusCode', '-');
        setValue('probeEndpoint', '-');
        message.textContent = '检查失败';
        attempts.textContent = '检查失败';
        content.textContent = '检查失败: ' + e;
      }
    }

    checkHealth();
  </script>
</body>
</html>
