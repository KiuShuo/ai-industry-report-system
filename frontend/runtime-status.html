<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>运行模式状态</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #f6f7fb; color: #222; }
    .wrap { max-width: 960px; margin: 0 auto; background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 4px 18px rgba(0,0,0,.08); }
    button { padding: 12px 16px; cursor: pointer; }
    pre { white-space: pre-wrap; background: #f3f4f6; padding: 16px; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>系统运行模式状态</h1>
    <p>用于查看当前系统是优先走 DeerFlow 还是本地链路。</p>
    <button onclick="checkHealth()">检查状态</button>
    <h2>返回结果</h2>
    <pre id="content">等待检查...</pre>
  </div>
  <script>
    async function checkHealth() {
      const content = document.getElementById('content');
      content.textContent = '检查中...';
      try {
        const res = await fetch('/health');
        const data = await res.json();
        content.textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        content.textContent = '检查失败: ' + e;
      }
    }
  </script>
</body>
</html>
