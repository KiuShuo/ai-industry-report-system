<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>报告查看</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #f6f7fb; color: #222; }
    .wrap { max-width: 960px; margin: 0 auto; background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 4px 18px rgba(0,0,0,.08); }
    input, button { padding: 12px; margin-right: 8px; }
    button { cursor: pointer; }
    pre { white-space: pre-wrap; background: #f3f4f6; padding: 16px; border-radius: 8px; }
    .meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin: 20px 0; }
    .item { background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px; }
    .label { font-size: 12px; color: #6b7280; margin-bottom: 6px; }
    .value { font-size: 16px; font-weight: 600; word-break: break-word; }
    .report-html { background: #fcfcfd; border: 1px solid #e5e7eb; border-radius: 10px; padding: 20px; margin-top: 18px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>报告查看</h1>
    <p>输入任务 ID，查看系统生成的报告内容。</p>
    <input id="taskId" placeholder="请输入任务 ID" style="width: 320px;" />
    <button onclick="loadReport()">查询报告</button>
    <div class="meta">
      <div class="item">
        <div class="label">任务状态</div>
        <div class="value" id="taskStatus">-</div>
      </div>
      <div class="item">
        <div class="label">偏好模式</div>
        <div class="value" id="preferredMode">-</div>
      </div>
      <div class="item">
        <div class="label">实际模式</div>
        <div class="value" id="actualMode">-</div>
      </div>
      <div class="item">
        <div class="label">Fallback 原因</div>
        <div class="value" id="fallbackReason">-</div>
      </div>
      <div class="item">
        <div class="label">Skill</div>
        <div class="value" id="skillName">-</div>
      </div>
    </div>
    <h2>报告内容</h2>
    <pre id="content">等待查询...</pre>
    <div id="htmlContent" class="report-html" style="display:none;"></div>
  </div>
  <script>
    let pollTimer = null;

    function getApiBase() {
      if (window.location.port === '8000') {
        return '';
      }
      return window.location.protocol + '//' + window.location.hostname + ':8000';
    }

    function setTaskState(task) {
      document.getElementById('taskStatus').textContent = task.status || '-';
      document.getElementById('preferredMode').textContent = task.preferredMode || task.requestedMode || '-';
      document.getElementById('actualMode').textContent = task.mode || '-';
      document.getElementById('fallbackReason').textContent = task.fallbackReason || '-';
      document.getElementById('skillName').textContent = task.skillName || '-';
    }

    async function fetchTask(taskId) {
      const res = await fetch(getApiBase() + '/api/task/status/' + taskId);
      return res.json();
    }

    async function fetchReport(taskId) {
      const res = await fetch(getApiBase() + '/api/report/' + taskId);
      return res.json();
    }

    async function loadReport() {
      const taskId = document.getElementById('taskId').value.trim();
      const content = document.getElementById('content');
      const htmlContent = document.getElementById('htmlContent');
      if (!taskId) {
        content.textContent = '请先输入任务 ID';
        return;
      }
      if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
      content.textContent = '正在加载...';
      htmlContent.style.display = 'none';
      htmlContent.innerHTML = '';
      try {
        const task = await fetchTask(taskId);
        setTaskState(task);
        const data = await fetchReport(taskId);
        content.textContent = data && data.markdownContent ? data.markdownContent : JSON.stringify(data, null, 2);
        if (data && data.htmlContent) {
          htmlContent.innerHTML = data.htmlContent;
          htmlContent.style.display = 'block';
        }
        if (task.status !== 'finished' && task.status !== 'failed') {
          pollTimer = setInterval(async () => {
            try {
              const nextTask = await fetchTask(taskId);
              setTaskState(nextTask);
              const nextReport = await fetchReport(taskId);
              content.textContent = nextReport && nextReport.markdownContent ? nextReport.markdownContent : JSON.stringify(nextReport, null, 2);
              if (nextReport && nextReport.htmlContent) {
                htmlContent.innerHTML = nextReport.htmlContent;
                htmlContent.style.display = 'block';
              }
              if (nextTask.status === 'finished' || nextTask.status === 'failed') {
                clearInterval(pollTimer);
                pollTimer = null;
              }
            } catch (innerError) {
              content.textContent = '轮询失败: ' + innerError;
              clearInterval(pollTimer);
              pollTimer = null;
            }
          }, 1500);
        }
      } catch (e) {
        content.textContent = '加载失败: ' + e;
      }
    }

    const params = new URLSearchParams(window.location.search);
    const taskIdFromQuery = params.get('taskId');
    if (taskIdFromQuery) {
      document.getElementById('taskId').value = taskIdFromQuery;
      loadReport();
    }
  </script>
</body>
</html>
