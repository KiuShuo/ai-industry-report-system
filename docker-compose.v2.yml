version: '3.9'

services:
  backend:
    image: python:3.10
    container_name: ai-report-backend-v2
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEERFLOW_BASE_URL: ${DEERFLOW_BASE_URL:-}
      DEERFLOW_API_KEY: ${DEERFLOW_API_KEY:-}
      PREFER_DEERFLOW: ${PREFER_DEERFLOW:-true}
    command: sh -c "pip install fastapi uvicorn requests markdown && uvicorn app.backend.mvp_main_v2:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  frontend:
    image: nginx:alpine
    container_name: ai-report-frontend-v2
    volumes:
      - ./frontend:/usr/share/nginx/html
    ports:
      - "8080:80"
