version: '3.9'

services:
  backend:
    image: python:3.10
    container_name: ai-report-backend
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "pip install fastapi uvicorn && uvicorn app.backend.mvp_main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  frontend:
    image: nginx:alpine
    container_name: ai-report-frontend
    volumes:
      - ./frontend:/usr/share/nginx/html
    ports:
      - "8080:80"
